name: Build & upload pieces binaries

# Triggered by a v* tag push (alongside the Release workflow) OR manually with a
# version (so binaries can be rebuilt/overwritten on an existing release).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version to attach binaries to (no leading v, e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

  build-stt-linux:
    needs: vars
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: stt-daemon-linux-x86_64
          - target: aarch64-unknown-linux-musl
            asset: stt-daemon-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Guard — Cargo version must equal the resolved version
        run: |
          cv="$(grep -m1 '^version' stt-daemon/Cargo.toml | sed -E 's/.*\"(.*)\".*/\1/')"
          echo "Cargo: $cv ; resolved: ${{ needs.vars.outputs.version }}"
          [ "$cv" = "${{ needs.vars.outputs.version }}" ] || { echo "::error::stt-daemon/Cargo.toml version ($cv) != ${{ needs.vars.outputs.version }} — bump Cargo first"; exit 1; }
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build (musl static, via cross)
        working-directory: stt-daemon
        run: cross build --release --bin stt-daemon --target ${{ matrix.target }}
      - name: Stage asset
        run: |
          mkdir -p dist
          cp "stt-daemon/target/${{ matrix.target }}/release/stt-daemon" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  build-stt-macos:
    needs: vars
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset: stt-daemon-darwin-arm64
          - target: x86_64-apple-darwin
            asset: stt-daemon-darwin-x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Guard — Cargo version must equal the resolved version
        run: |
          cv="$(grep -m1 '^version' stt-daemon/Cargo.toml | sed -E 's/.*\"(.*)\".*/\1/')"
          echo "Cargo: $cv ; resolved: ${{ needs.vars.outputs.version }}"
          [ "$cv" = "${{ needs.vars.outputs.version }}" ] || { echo "::error::stt-daemon/Cargo.toml version ($cv) != ${{ needs.vars.outputs.version }} — bump Cargo first"; exit 1; }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        working-directory: stt-daemon
        run: cargo build --release --bin stt-daemon --target ${{ matrix.target }}
      - name: Stage asset
        run: |
          mkdir -p dist
          cp "stt-daemon/target/${{ matrix.target }}/release/stt-daemon" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  build-linux:
    needs: vars
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: pieces-linux-x86_64
          - target: aarch64-unknown-linux-musl
            asset: pieces-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Guard — Cargo version must equal the resolved version
        run: |
          cv="$(grep -m1 '^version' pieces-daemon/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "Cargo: $cv ; resolved: ${{ needs.vars.outputs.version }}"
          [ "$cv" = "${{ needs.vars.outputs.version }}" ] || { echo "::error::pieces-daemon/Cargo.toml version ($cv) != ${{ needs.vars.outputs.version }} — bump Cargo first"; exit 1; }
          sver="$(grep -m1 'PIECES_VERSION=' skills/pieces/pieces.sh | sed -E 's/.*PIECES_VERSION="?([^"]*)"?.*/\1/')"
          [ "$sver" = "$cv" ] || { echo "::error::skills/pieces/pieces.sh PIECES_VERSION ($sver) != Cargo ($cv) — bump them together"; exit 1; }
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build (musl static, via cross)
        working-directory: pieces-daemon
        run: cross build --release --bin pieces --target ${{ matrix.target }}
      - name: Stage asset
        run: |
          mkdir -p dist
          cp "pieces-daemon/target/${{ matrix.target }}/release/pieces" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  build-macos:
    needs: vars
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset: pieces-darwin-arm64
          - target: x86_64-apple-darwin
            asset: pieces-darwin-x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Guard — Cargo version must equal the resolved version
        run: |
          cv="$(grep -m1 '^version' pieces-daemon/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "Cargo: $cv ; resolved: ${{ needs.vars.outputs.version }}"
          [ "$cv" = "${{ needs.vars.outputs.version }}" ] || { echo "::error::pieces-daemon/Cargo.toml version ($cv) != ${{ needs.vars.outputs.version }} — bump Cargo first"; exit 1; }
          sver="$(grep -m1 'PIECES_VERSION=' skills/pieces/pieces.sh | sed -E 's/.*PIECES_VERSION="?([^"]*)"?.*/\1/')"
          [ "$sver" = "$cv" ] || { echo "::error::skills/pieces/pieces.sh PIECES_VERSION ($sver) != Cargo ($cv) — bump them together"; exit 1; }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        working-directory: pieces-daemon
        run: cargo build --release --bin pieces --target ${{ matrix.target }}
      - name: Stage asset
        run: |
          mkdir -p dist
          cp "pieces-daemon/target/${{ matrix.target }}/release/pieces" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  upload:
    needs: [vars, build-linux, build-macos, build-stt-linux, build-stt-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          sha256sum pieces-* stt-daemon-* > SHA256SUMS
          cat SHA256SUMS
      - name: Ensure release exists, then upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ needs.vars.outputs.version }}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          cd dist
          gh release upload "$tag" \
            pieces-linux-x86_64 pieces-linux-arm64 pieces-darwin-arm64 pieces-darwin-x86_64 \
            stt-daemon-linux-x86_64 stt-daemon-linux-arm64 stt-daemon-darwin-arm64 stt-daemon-darwin-x86_64 \
            SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" --clobber
          echo "Uploaded 8 binaries + SHA256SUMS to $GITHUB_REPOSITORY release $tag"
