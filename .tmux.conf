# Prefix: C-a (C-b conflicts with Emacs)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Claude Code's integration with tmux focus tracking
set -g focus-events on

# True color support (needed for terminal Emacs themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Sync clipboard to local terminal via OSC 52 (works over SSH)
set -s set-clipboard on

# Scrollback buffer
set -g history-limit 50000

# Start window/pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Active pane: very visible border so the focused pane is obvious at a glance.
# With only one pane there are no borders to draw, so nothing shows up — exactly
# the "hide frame when single pane" behaviour we want, for free.
set -g pane-border-style        'fg=colour238'        # dim grey for inactive edges
set -g pane-active-border-style 'fg=colour220,bold'   # bright yellow + bold for active
set -g pane-border-lines        heavy                 # thicker box-drawing chars (tmux 3.2+)
set -g pane-border-indicators   both                  # color + arrow markers pointing into active pane

# Faster escape (important for Emacs/vim users)
set -sg escape-time 10

# Easy reload
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Status bar: CPU/NPU temperature + datetime on the right.
# Temperatures via helper script (avoids tmux $-expansion eating awk fields).
set -g status-interval 5
set -g status-right "#(~/willy/emacs_setup/tmux-temps.sh)  %H:%M %d-%b-%y"
set -g status-right-length 60

# --- Copy mode: Emacs-style keybindings ---
# Use emacs key table for copy mode
setw -g mode-keys emacs

# Enter copy mode + scroll via prefix
bind M-w copy-mode \; send-keys -X page-up
bind M-s copy-mode \; send-keys -X page-down

# Scrolling in copy mode
bind -T copy-mode M-w send-keys -X page-up
bind -T copy-mode M-s send-keys -X page-down

# Cursor movement (matching Emacs WASD-style)
bind -T copy-mode C-w send-keys -X cursor-up
bind -T copy-mode C-s send-keys -X cursor-down
bind -T copy-mode C-a send-keys -X cursor-left
bind -T copy-mode C-d send-keys -X cursor-right
bind -T copy-mode C-q send-keys -X back-to-indentation
bind -T copy-mode C-e send-keys -X end-of-line
bind -T copy-mode M-a send-keys -X previous-word
bind -T copy-mode M-d send-keys -X next-word

# Selection and copy
# C-x Space to begin selection (two-key sequence via custom key table)
bind -T copy-mode C-x switch-client -T copy-mode-cx
bind -T copy-mode-cx Space send-keys -X begin-selection
# macOS: pbcopy; Linux: tmux already stores in paste buffer via OSC 52.
# Plain copy-selection / copy-pipe (no -and-cancel, no -no-clear):
# copies the text, clears the highlight, leaves the cursor where it is,
# and stays in copy mode.
if-shell "uname | grep -q Darwin" \
  'bind -T copy-mode C-c send-keys -X copy-pipe "pbcopy"' \
  'bind -T copy-mode C-c send-keys -X copy-selection'

# Incremental search forward (C-r is the default for backward search)
bind -T copy-mode C-f command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
# Repeat last search: M-f forward, M-r backward
bind -T copy-mode M-f send-keys -X search-again
bind -T copy-mode M-r send-keys -X search-reverse

# Window navigation (C-a, release, then w/s)
unbind -n C-M-w
unbind -n C-M-s
unbind C-w
unbind C-s
bind w previous-window
bind s next-window

# Jump directly to window N (C-a 1/2/3 are taken for pane ops, Emacs-style)
bind M-1 select-window -t :1
bind M-2 select-window -t :2
bind M-3 select-window -t :3
bind M-4 select-window -t :4
bind M-5 select-window -t :5
bind M-6 select-window -t :6
bind M-7 select-window -t :7
bind M-8 select-window -t :8
bind M-9 select-window -t :9

# Open new window/pane in same directory as the current pane
bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Emacs-style split bindings: C-a 2 = stacked, C-a 3 = side-by-side
bind 2 split-window -v -c "#{pane_current_path}"
bind 3 split-window -h -c "#{pane_current_path}"

# Emacs-style C-a 1: kill all other panes (like C-x 1 delete-other-windows)
bind 1 kill-pane -a

# Close window/pane without confirmation
bind k kill-window
bind x kill-pane

# Rotate panes: C-M-a (no prefix). C-M-d is left for Emacs other-window.
bind -n C-M-a select-pane -t :.+

# Smart pane resize (mirrors Emacs my/shrink-window-smart / my/enlarge-window-smart).
# M-} enlarges, M-{ shrinks. Auto-picks axis: full-width pane -> vertical, else horizontal.
# Keys are single-quoted because tmux 3.x treats {/} as command-block delimiters.
bind -n 'M-}' if-shell -F '#{&&:#{pane_at_left},#{pane_at_right}}' 'resize-pane -D 1' 'resize-pane -R 1'
bind -n 'M-{' if-shell -F '#{&&:#{pane_at_left},#{pane_at_right}}' 'resize-pane -U 1' 'resize-pane -L 1'
