# Prefix: C-a (C-b conflicts with Emacs)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support (needed for terminal Emacs themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Sync clipboard to local terminal via OSC 52 (works over SSH)
set -s set-clipboard on

# Scrollback buffer
set -g history-limit 50000

# Start window/pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Faster escape (important for Emacs/vim users)
set -sg escape-time 10

# Easy reload
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Copy mode: Emacs-style keybindings ---
# Use emacs key table for copy mode
setw -g mode-keys emacs

# Enter copy mode + scroll via prefix
bind M-w copy-mode \; send-keys -X page-up
bind M-s copy-mode \; send-keys -X page-down

# Scrolling in copy mode
bind -T copy-mode M-w send-keys -X page-up
bind -T copy-mode M-s send-keys -X page-down

# Cursor movement (matching Emacs WASD-style)
bind -T copy-mode C-w send-keys -X cursor-up
bind -T copy-mode C-s send-keys -X cursor-down
bind -T copy-mode C-a send-keys -X cursor-left
bind -T copy-mode C-d send-keys -X cursor-right
bind -T copy-mode C-q send-keys -X back-to-indentation
bind -T copy-mode C-e send-keys -X end-of-line
bind -T copy-mode M-a send-keys -X previous-word
bind -T copy-mode M-d send-keys -X next-word

# Selection and copy
# C-x Space to begin selection (two-key sequence via custom key table)
bind -T copy-mode C-x switch-client -T copy-mode-cx
bind -T copy-mode-cx Space send-keys -X begin-selection
# macOS: pbcopy; Linux: tmux already stores in paste buffer, just cancel
if-shell "uname | grep -q Darwin" \
  'bind -T copy-mode C-c send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind -T copy-mode C-c send-keys -X copy-selection-and-cancel'

# Incremental search forward (C-r is the default for backward search)
bind -T copy-mode C-f command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
# Repeat last search: M-f forward, M-r backward
bind -T copy-mode M-f send-keys -X search-again
bind -T copy-mode M-r send-keys -X search-reverse

# Window navigation (C-a, release, then w/s)
unbind -n C-M-w
unbind -n C-M-s
unbind C-w
unbind C-s
bind w previous-window
bind s next-window
